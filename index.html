<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>APAC - Advanced Predictive Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-slate-900 text-white font-sans p-4">
    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-4 bg-slate-800 p-8 rounded-2xl border border-slate-700 h-fit">
            <h1 class="text-3xl font-black italic text-emerald-400 mb-8 tracking-tighter">APAC <span class="text-white font-light text-xs">RS v1.0</span></h1>
            
            <div class="space-y-4 mb-8">
                <input id="origem" type="text" placeholder="Origem (Ex: Porto Seco, POA)" class="w-full p-3 bg-slate-900 rounded-xl border border-slate-700 text-sm outline-none focus:border-emerald-500">
                <input id="destino" type="text" placeholder="Destino" class="w-full p-3 bg-slate-900 rounded-xl border border-slate-700 text-sm outline-none focus:border-emerald-500">
                <div class="grid grid-cols-2 gap-4">
                    <input id="kml" type="number" value="2.5" step="0.1" class="w-full p-3 bg-slate-900 rounded-xl border border-slate-700 text-sm">
                    <input id="preco" type="number" value="6.15" step="0.01" class="w-full p-3 bg-slate-900 rounded-xl border border-slate-700 text-sm">
                </div>
                <button onclick="alert('Funcionalidade de Rota Única em manutenção para BI')" class="w-full py-4 bg-slate-700 font-bold rounded-xl text-xs uppercase opacity-50 cursor-not-allowed">Diagnosticar Rota GPS</button>
            </div>

            <div class="p-6 bg-slate-900 rounded-2xl border border-dashed border-emerald-500/30">
                <h3 class="text-emerald-400 font-bold uppercase text-[10px] mb-4 italic tracking-widest">Análise de Frota (Massa)</h3>
                <input type="file" id="arquivoExcel" class="text-[10px] text-slate-500 mb-4 block w-full file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-[10px] file:font-semibold file:bg-emerald-600 file:text-white hover:file:bg-emerald-500">
                <button onclick="subirPlanilha()" id="btn-frota" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 rounded-xl font-black text-[10px] uppercase transition shadow-lg">
                    Gerar Business Intelligence
                </button>
            </div>
        </div>

        <div id="relatorio-area" class="lg:col-span-8 bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-2xl">
            <div id="print-content">
                <div class="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
                    <h2 class="text-xl font-black italic uppercase text-emerald-500">Dashboard <span class="text-white">Logístico BI</span></h2>
                    <span id="bi-status" class="text-[10px] text-slate-400 font-bold bg-slate-900 px-3 py-1 rounded uppercase tracking-widest italic">Aguardando Dados</span>
                </div>

                <div id="resultado-frota" class="hidden space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="bg-red-500/10 p-6 rounded-2xl border border-red-500/20 text-center">
                            <p class="text-[9px] text-red-400 uppercase font-bold mb-1">Prejuízo Total Estimado</p>
                            <h4 id="bi-prejuizo" class="text-4xl font-black text-red-500">R$ 0,00</h4>
                        </div>
                        <div class="bg-emerald-500/10 p-6 rounded-2xl border border-emerald-500/20 text-center text-white">
                            <p class="text-[9px] text-emerald-400 uppercase font-bold mb-1">Volume de Viagens</p>
                            <h4 id="bi-viagens" class="text-4xl font-black">0</h4>
                        </div>
                    </div>

                    <div>
                        <h4 class="text-white font-bold text-[10px] uppercase mb-4 tracking-widest border-l-4 border-emerald-500 pl-2">Top Gargalos de Inércia</h4>
                        <div id="lista-gargalos" class="grid grid-cols-1 gap-2">
                        </div>
                    </div>
                </div>

                <div id="placeholder-bi" class="h-64 flex items-center justify-center text-slate-600 border-2 border-dashed border-slate-700 rounded-2xl">
                    <p class="text-xs uppercase font-bold">Nenhuma planilha processada</p>
                </div>
            </div>
            
            <button onclick="baixarPDF()" class="mt-8 w-full py-3 bg-slate-700 hover:bg-slate-600 rounded-xl text-[10px] font-bold uppercase tracking-widest transition">Exportar Relatório PDF</button>
        </div>
    </div>

    <script>
        async function subirPlanilha() {
            const fileInput = document.getElementById('arquivoExcel');
            if (!fileInput.files[0]) return alert("Por favor, selecione um arquivo Excel ou CSV.");

            const btn = document.getElementById('btn-frota');
            btn.innerText = "IDENTIFICANDO PADRÕES SQL...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);
            formData.append("consumo_padrao", parseFloat(document.getElementById('kml').value) || 2.5);

            try {
                const res = await fetch('/processar-planilha', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await res.json();
                
                if (!res.ok) {
                    // Exibe a mensagem de erro específica vinda do FastAPI (ex: Colunas ausentes)
                    throw new Error(data.detail || "Erro inesperado ao processar arquivo.");
                }
                
                // Mostrar resultados de forma segura
                document.getElementById('placeholder-bi').classList.add('hidden');
                document.getElementById('resultado-frota').classList.remove('hidden');
                document.getElementById('bi-status').innerText = "Análise Concluída";
                
                document.getElementById('bi-prejuizo').innerText = data.resumo.prejuizo_total_frota;
                document.getElementById('bi-viagens').innerText = data.resumo.total_viagens;

                const lista = document.getElementById('lista-gargalos');
                lista.innerHTML = "";
                
                if (data.gargalos_identificados && data.gargalos_identificados.length > 0) {
                    data.gargalos_identificados.forEach(g => {
                        lista.innerHTML += `
                            <div class="p-4 bg-slate-900 rounded-xl border border-slate-700 flex justify-between items-center group hover:border-emerald-500/50 transition-all">
                                <span class="text-[11px] font-medium text-slate-300">${g.rota}</span>
                                <div class="text-right">
                                    <span class="block text-red-500 font-black text-xs">${g.perda_estimada}</span>
                                    <span class="text-[8px] text-slate-500 uppercase">${g.status}</span>
                                </div>
                            </div>`;
                    });
                }

            } catch (e) {
                alert("Falha no processamento:\n" + e.message);
            } finally {
                btn.innerText = "Gerar Business Intelligence";
                btn.disabled = false;
            }
        }

        function baixarPDF() {
            const element = document.getElementById('print-content');
            html2pdf().set({
                margin: 0.5,
                filename: 'APAC_BI_Frota.pdf',
                html2canvas: { scale: 2, backgroundColor: '#1e293b' },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            }).from(element).save();
        }
    </script>
</body>
</html>
